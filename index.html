<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de notícias</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="container">
        <nav id="primary" class="grid grid-flow-col">
            <div>
                <img src="/assets/icons/List.svg" alt="Íconde de uma lista de menu">
                <strong>Menu</strong>
            </div>
            <div>
                <img src="/assets/images/Logo.png" alt="Logo da aplicação, Tech News">
            </div>
            <div>
                <strong>Buscar</strong>
                <img src="/assets/icons/MagnifyingGlass.svg" alt="Íconde de lupa, de pesquisar">
            </div>
        </nav>
        <div id="secondary" class="grid grid-flow-col">
            <a href="#">Inteligência Artificial</a>
            <a href="#">Blockchain</a>
            <a href="#">Hologramas</a>
            <a href="#">Internet</a>
            <a href="#">Vestíveis</a>
            <a href="#">Realidade Aumentada</a>
            <a href="#">Realidade  Virtual</a>
        </div>
    </header>

    <main class="container grid">
        <section id="featured" class="grid grid-flow-col gap-16">
            <figure class="card">
                <img src="assets/images/Image 01.png" alt="Imagem de um robô de cor branco e olhos azuis">
                <figcaption>
                    <span class="content-tag">Robótica</span>
                    <h2 class="text-2xl">Robôs domésticos começam a ser adotados para tarefas diárias, prometendo mais conforto e eficiência nas residências.</h2>
                </figcaption>
            </figure>

            <div class="grid grid-col-2 gap-16">
                <figure class="card">
                    <img src="assets/images/Image 02.png" alt="Imagem de uma pessoa interagindo com celular">
                    <figcaption>
                        <span class="content-tag">Hologramas</span>
                        <h2 class="text-lg">Novo Smartphone Projetor 3D chega ao mercado, transformando a forma como vemos nossas telas!</h2>
                    </figcaption>
                </figure>
                <figure class="card">
                    <img src="assets/images/Image 03.png" alt="Imagem de 6G, com foguete subindo">
                    <figcaption>
                        <span class="content-tag">Internet</span>
                        <h2 class="text-lg">Tecnologia 6G chega às metrópoles brasileiras, prometendo revolucionar a forma como...</h2>
                    </figcaption>
                </figure>
                <figure class="card">
                    <img src="assets/images/Image 04.png" alt="Imagem de uma mulher sorrindo com fones de ouvido">
                    <figcaption>
                        <span class="content-tag">Vestíveis</span>
                        <h2 class="text-lg">Empresa lança relógio inteligente capaz de monitorar a saúde mental, oferecendo insights valiosos para...</h2>
                    </figcaption>
                </figure>
                <figure class="card">
                    <img src="assets/images/Image 05.png" alt="Imagem de duas crianças com óculos sorrindo e se divertindo">
                    <figcaption>
                        <span class="content-tag">Realidade Virtual</span>
                        <h2 class="text-lg">Escolas adotam a tecnologia VR para proporcionar experiências imersivas, transformando...</h2>
                    </figcaption>
                </figure>
            </div>
        </section>

        <section id="weekly">
            <header class="grid grid-flow-col">
                <h3>Mais lidas da semana</h3>
                <a href="#">
                    <strong>Ver tudo</strong>
                    <span></span>
                </a>
            </header>

            <div class="grid gap-16">
                <figure>
                    <span class="content-tag">veículos</span>
                    <img src="assets/images/Image 06.png" alt="">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex quas minima facilis, officiis at sunt hic</p>
                </figure>
                <figure>
                    <span class="content-tag">veículos</span>
                    <img src="assets/images/Image 07.png" alt="">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex quas minima facilis, officiis at sunt hic</p>
                </figure>
                <figure>
                    <span class="content-tag">veículos</span>
                    <img src="assets/images/Image 08.png" alt="">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex quas minima facilis, officiis at sunt hic</p>
                </figure>
                <figure>
                    <span class="content-tag">veículos</span>
                    <img src="assets/images/Image 09.png" alt="">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ex quas minima facilis, officiis at sunt hic</p>
                </figure>
            </div>
        </section>
    </main>
</body>
</html>
